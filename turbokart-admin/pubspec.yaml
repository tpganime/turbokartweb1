name: turbokart_admin
description: "TurboKart Admin Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  cloud_firestore: ^5.6.1
  fluttertoast: ^8.2.10
  firebase_auth: ^5.4.0
  progress_dialog_null_safe: ^3.0.0
  flutter_admin_scaffold: ^1.4.0
  firebase_storage: ^12.4.0
  chips_choice: ^3.0.1
  flutter_easyloading: ^3.0.5
  flutter_switch: ^0.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
